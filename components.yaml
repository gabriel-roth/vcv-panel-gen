# Component size database for VCV Rack widget classes.
#
# Sizes are in mm and are each widget's TRUE DRAWN size (the actual on-panel
# graphic), not any larger reserved/padded footprint used elsewhere for layout
# spacing. Generated by tools/measure_components.py from the installed Rack
# ComponentLibrary; re-run that tool to refresh against a different Rack build.
#
# RoundBlackKnob / RoundSmallBlackKnob / RoundBigBlackKnob use the v1
# vcv-panel-gen/constants.py TRUE_KNOB_DIAM / TRUE_SMALL_KNOB_DIAM /
# TRUE_HERO_KNOB_DIAM constants (authoritative per the v2 task brief); this
# tool's own measurement of the same ComponentLibrary SVGs matched them
# exactly, so there was no discrepancy to resolve.
#
# MediumLight / SmallLight / LargeLight are the one class of asset NOT
# authored in px at 75 dpi like the rest of the library: their SVGs declare
# width/height directly in "mm" (e.g. width="3mm"), so those values are used
# as-is (measure_mm() detects this and skips the px->mm conversion for them).
#
# LEDBezel has no ComponentLibrary asset of its own -- in real Rack it is the
# VCVBezel graphic with a light widget drawn on top, at the same footprint --
# so it reuses VCVBezel's measured size here.
components:
  RoundBlackKnob: { shape: circle, d: 9.6 }  # = v1 TRUE_ constant; measured RoundBlackKnob.svg at 9.6004x9.6004mm, matches.
  RoundSmallBlackKnob: { shape: circle, d: 7.68 }  # = v1 TRUE_ constant; measured RoundSmallBlackKnob.svg at 7.6795x7.6795mm, matches.
  RoundBigBlackKnob: { shape: circle, d: 15.24 }  # = v1 TRUE_ constant; measured RoundBigBlackKnob.svg at 15.2400x15.2400mm, matches.
  RoundHugeBlackKnob: { shape: circle, d: 18.24 }  # measured RoundHugeBlackKnob.svg at 18.2403x18.2404mm
  Trimpot: { shape: circle, d: 6.05 }  # measured Trimpot.svg at 6.0471x6.0484mm
  PJ301MPort: { shape: circle, d: 8.03 }  # measured PJ301M.svg at 8.0264x8.0264mm
  VCVButton: { shape: circle, d: 6.1 }  # measured VCVButton_0.svg at 6.0959x6.0960mm
  VCVBezel: { shape: circle, d: 7.2 }  # measured VCVBezel.svg at 7.2001x7.2000mm
  CKSS: { shape: rect, w: 4.74, h: 6.99 }  # measured CKSS_0.svg at 4.7413x6.9905mm
  CKSSThree: { shape: rect, w: 4.56, h: 9.6 }  # measured CKSSThree_0.svg at 4.5574x9.6004mm
  MediumLight: { shape: circle, d: 3 }  # measured MediumLight.svg at 3.0000x3.0000mm
  SmallLight: { shape: circle, d: 2 }  # measured SmallLight.svg at 2.0000x2.0000mm
  LargeLight: { shape: circle, d: 5 }  # measured LargeLight.svg at 5.0000x5.0000mm
  ScrewSilver: { shape: circle, d: 5.08 }  # measured ScrewSilver.svg at 5.0800x5.0796mm
  ScrewBlack: { shape: circle, d: 5.08 }  # measured ScrewBlack.svg at 5.0800x5.0796mm
  LEDBezel: { shape: circle, d: 7.2 }  # no dedicated asset; reuses VCVBezel's measured size (7.2001x7.2000mm)

# needle -> canonical component key above, for ComponentDB's substring-
# containment fallback (so a subclass like RoundSmallBlackSnapKnob or
# CKSSThreeHorizontal resolves without its own entry). Same technique as v1
# preview.py's CLASS_ASSETS needle list.
aliases:
  RoundBlackKnob: ["RoundBlack"]
  RoundSmallBlackKnob: ["RoundSmallBlack"]
  RoundBigBlackKnob: ["RoundBigBlack", "RoundBig"]
  RoundHugeBlackKnob: ["RoundHugeBlack"]
  Trimpot: ["Trimpot"]
  PJ301MPort: ["PJ301", "Port"]
  VCVButton: ["VCVButton", "Button"]
  VCVBezel: ["VCVBezel"]
  LEDBezel: ["LEDBezel"]
  CKSSThree: ["CKSSThree"]
  CKSS: ["CKSS"]
  MediumLight: ["MediumLight"]
  SmallLight: ["SmallLight"]
  LargeLight: ["LargeLight"]
  ScrewSilver: ["ScrewSilver"]
  ScrewBlack: ["ScrewBlack"]

defaults:
  param: "RoundBlackKnob"
  input: "PJ301MPort"
  output: "PJ301MPort"
  light: "MediumLight<RedLight>"
