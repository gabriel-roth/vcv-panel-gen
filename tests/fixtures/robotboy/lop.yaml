# Löp panel spec (v2/new format) — regenerates res/Lop.svg from RobotBoy with
# exact component-center and label-path parity against the shipped SVG
# (tests/fixtures/robotboy/reference/Lop.svg).
#
# Component `name`s are the FULL C++ enum names (helper.py reads the id
# verbatim, splitting off "#Widget"), matching Lop.cpp.
#
# All x/y values below (grid columns/rows, absolute positions, label
# baselines) are the exact centers/baselines recovered from the reference SVG
# via tools/extract_reference.py — this spec reproduces the RESULTING layout
# of the v1 spec's band math + nudges (see
# /Users/gabrielroth/Dev/RobotBoy/panel-specs/lop.yaml for the original
# narrative), not the math itself.
slug: Lop
name: LÖP
hp: 12
side_margin: 3

title:
  # The "Shuttleblock Test Demi" trial font installed on this machine has no
  # U+00D6 (Ö) glyph, so "LÖP" can't be set as live text — lop-logo.svg is a
  # baked vector wordmark (traced from the real Shuttleblock Demi) that
  # carries the real letterforms instead. size 9 + valign center reproduces
  # v1's title_size/title_valign; the generator scales/centers/bakes it (see
  # logo.py) with no transform= surviving in the output.
  logo: assets/lop-logo.svg
  size: 9
  valign: center
  # v1's valign:center formula centers the title in the headroom above the
  # title band PLUS the first row's gap_above (v1's screen row had gap_above:
  # 0.4); v2's _resolve_title has no row model to consult, so it centers in
  # the bare TITLE_BAND_MM only, landing 0.2mm high. dy restores that 0.4/2 =
  # 0.2mm the v1 formula added, reproducing the reference exactly (verified
  # against the baked logo's path coordinates).
  dy: 0.2

# One neutral control-zone tint (white, unified) behind rows 1-2 only;
# defaults (fill #ffffff, opacity 0.14, rx 2.0) match the reference exactly.
zones:
  - {x: 1.5, y: 35.15, w: 57.96, h: 46}

grids:
  # Row 1: Size/Pos/Speed/Jitter knob+CV stacks — 4 even columns; {count:4,
  # from:9.87, to:51.09} lands exactly on the reference centers (step 13.74).
  row1:
    cols: {count: 4, from: 9.87, to: 51.09}
    rows:
      knob: 46.05
      cv: 58.0
      label: 39.35

  # Rows 2-3 share the same 3 even columns (12.16/30.48/48.8, step 18.32):
  # row 2 is Trig/Jump/Grid; row 3 is Dry/Wet+CV, Clear (button+trig stack),
  # Record (button+trig stack).
  row23:
    cols: {count: 3, from: 12.16, to: 48.8}
    rows:
      row2_label: 67.35
      row2: 74.15
      row3_label: 86.25
      row3_top: 92.95
      row3_bot: 104.9

elements:
  # Screen: bleeds to 1.5mm from the panel edges, below the top-inset screws
  # (matches the reference rect exactly).
  - {name: SCREEN, kind: widget, rect: {x: 1.5, y: 10.4, w: 57.96, h: 22.35}}

  # Row 1 labels + knob/CV stacks.
  - {text: Size,   grid: row1, col: 1, row: label}
  - {text: Pos,    grid: row1, col: 2, row: label}
  - {text: Speed,  grid: row1, col: 3, row: label}
  - {text: Jitter, grid: row1, col: 4, row: label}
  - {name: SIZE_PARAM,      grid: row1, col: 1, row: knob}
  - {name: POSITION_PARAM,  grid: row1, col: 2, row: knob}
  - {name: SPEED_PARAM,     grid: row1, col: 3, row: knob}
  - {name: JITTER_PARAM,    grid: row1, col: 4, row: knob}
  - {name: SIZE_CV_INPUT,     grid: row1, col: 1, row: cv}
  - {name: POSITION_CV_INPUT, grid: row1, col: 2, row: cv}
  - {name: SPEED_CV_INPUT,    grid: row1, col: 3, row: cv}
  - {name: JITTER_CV_INPUT,   grid: row1, col: 4, row: cv}

  # Row 2: Trig / Jump jacks, Grid snap knob (small, shared RoundSmallBlack-
  # SnapKnob widget from src/loooop) with its position values printed in a
  # close ring around it.
  - {text: Trig, grid: row23, col: 1, row: row2_label}
  - {text: Jump, grid: row23, col: 2, row: row2_label}
  - {text: Grid, grid: row23, col: 3, row: row2_label}
  - {name: TRIG_INPUT, grid: row23, col: 1, row: row2}
  - {name: JUMP_INPUT, grid: row23, col: 2, row: row2}
  - {name: GRID_PARAM, widget: RoundSmallBlackSnapKnob, grid: row23, col: 3, row: row2}
  - {ring: ["Ø", "4", "8", "16", "32", "64"], around: GRID_PARAM}

  # Row 3: Dry/Wet knob+CV stack, Clear and Record as button+trig stacks.
  - {text: Dry/Wet, grid: row23, col: 1, row: row3_label}
  - {text: Clear,   grid: row23, col: 2, row: row3_label}
  - {text: Record,  grid: row23, col: 3, row: row3_label}
  - {name: DRYWET_PARAM,     grid: row23, col: 1, row: row3_top}
  - {name: CLEAR_PARAM,      widget: VCVButton, grid: row23, col: 2, row: row3_top}
  - {name: RECORD_PARAM,     widget: VCVButton, grid: row23, col: 3, row: row3_top}
  - {name: DRYWET_CV_INPUT,   grid: row23, col: 1, row: row3_bot}
  - {name: CLEAR_TRIG_INPUT,  grid: row23, col: 2, row: row3_bot}
  - {name: RECORD_TRIG_INPUT, grid: row23, col: 3, row: row3_bot}

  # Audio row: In/Out stereo pairs sharing one centered label each; Overdub
  # mode button on the jack center line between them, label below (matching
  # the jack labels' "below" placement).
  - {name: AUDIO_L_INPUT, x: 7.35, y: 116.05}
  - {name: AUDIO_R_INPUT, x: 17.05, y: 116.05}
  - {name: OVERDUB_PARAM, widget: OverdubButton, x: 30.48, y: 116.05}
  - {name: OUT_L_OUTPUT, x: 43.91, y: 116.05}
  - {name: OUT_R_OUTPUT, x: 53.61, y: 116.05}
  - {text: In,      x: 12.2,  y: 124.55}
  - {text: Overdub, x: 30.48, y: 124.55}
  # "Out" at its exact reference position sits 0.2mm inside the bottom-right
  # mounting screw's conservative SCREW_RADIUS_MM=2.0 keep-out circle (the
  # drawn marker itself is only r=1.6 and doesn't visually touch it) --
  # inherited unchanged from the v1 output, which this spec reproduces
  # exactly; nudging Out's position to clear the keep-out circle would break
  # exact path parity with the shipped reference. Deliberate and suppressed
  # below via overlaps_ok's text:/screw@x,y forms.
  - {text: Out,     x: 48.76, y: 124.55}

# Vertical bars: each row-1 knob down to its own CV jack, and each row-3
# button down to its own trig jack (button over jack, tied by the bar). Row
# 2 (Trig/Jump/Grid) has no stacks, so no connectors there.
connectors:
  - [SIZE_PARAM, SIZE_CV_INPUT]
  - [POSITION_PARAM, POSITION_CV_INPUT]
  - [SPEED_PARAM, SPEED_CV_INPUT]
  - [JITTER_PARAM, JITTER_CV_INPUT]
  - [DRYWET_PARAM, DRYWET_CV_INPUT]
  - [CLEAR_PARAM, CLEAR_TRIG_INPUT]
  - [RECORD_PARAM, RECORD_TRIG_INPUT]

overlaps_ok:
  # The "Out" label sits 0.2mm into the bottom-right mounting screw's drawn
  # keep-out circle -- inherited unchanged from the v1 reference panel
  # itself (see the comment by the Out element above); deliberate.
  - [text:OUT, "screw@53.46,125.50"]
